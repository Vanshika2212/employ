    <h3>Employee List 👨‍💼</h3>

    <!-- Add Employee Form -->
    <div class="panel">
        <h4>Add New Employee</h4>

        <input id="empName" placeholder="Enter Name">
        <input id="empEmail" placeholder="Enter Email">

        <button onclick="addEmployee()">Add Employee</button>
    </div>

    <!-- Employee Table -->
    <div class="panel">
        <h4>All Employees</h4>

        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="employeeTable">
                <!-- Data from backend -->
            </tbody>
        </table>
    </div>
