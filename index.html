<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-users"></i> Employee Attendance System</h1>
                <div class="user-profile">
                    <span id="currentUser">Admin</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-user-check"></i>
                    <div>
                        <h3 id="presentCount">12</h3>
                        <span>Present Today</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-user-times"></i>
                    <div>
                        <h3 id="absentCount">3</h3>
                        <span>Absent Today</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3 id="lateCount">2</h3>
                        <span>Late Arrivals</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-calendar-day"></i>
                    <div>
                        <h3 id="totalEmployees">25</h3>
                        <span>Total Employees</span>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="attendance">Today's Attendance</button>
                    <button class="tab-btn" data-tab="employees">Employees</button>
                    <button class="tab-btn" data-tab="reports">Reports</button>
                </div>

                <!-- Attendance Tab -->
                <div class="tab-content active" id="attendance">
                    <div class="table-container">
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th>Employee ID</th>
                                    <th>Name</th>
                                    <th>Department</th>
                                    <th>Check In</th>
                                    <th>Check Out</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTableBody">
                                <!-- Data populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Employees Tab -->
                <div class="tab-content" id="employees">
                    <div class="table-container">
                        <table class="employees-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Department</th>
                                    <th>Phone</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employeesTableBody">
                                <!-- Data populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Reports Tab -->
                <div class="tab-content" id="reports">
                    <div class="reports-container">
                        <div class="report-filters">
                            <input type="date" id="reportDate" class="form-input">
                            <select id="reportDepartment" class="form-select">
                                <option>All Departments</option>
                                <option>IT</option>
                                <option>HR</option>
                                <option>Finance</option>
                            </select>
                            <button class="btn btn-primary" onclick="generateReport()">
                                <i class="fas fa-download"></i> Generate Report
                            </button>
                        </div>
                        <div id="reportContent">
                            <canvas id="attendanceChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal" id="addEmployeeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Employee</h3>
                <span class="close" onclick="closeModal('addEmployeeModal')">&times;</span>
            </div>
            <form id="employeeForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="empName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="empEmail" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="empDept" required>
                        <option value="">Select Department</option>
                        <option value="IT">IT</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="empPhone">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addEmployeeModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Employee</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
